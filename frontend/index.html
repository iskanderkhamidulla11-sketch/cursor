<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Сделки FunPay</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>Сделки FunPay</h1>
      <p>Безопасные сделки, баланс и отзывы.</p>
    </header>

    <nav class="tabs">
      <button type="button" class="tab active" data-tab="deals">Сделки</button>
      <button type="button" class="tab" data-tab="balance">Баланс</button>
      <button type="button" class="tab" data-tab="reviews">Отзывы</button>
      <button type="button" class="tab" data-tab="withdraw">Вывод</button>
    </nav>

    <section class="panel active" id="panel-deals">
      <h2>Создать сделку</h2>
      <label for="dealUsername">Username продавца</label>
      <input id="dealUsername" type="text" placeholder="@seller_username" maxlength="64" />
      <label for="dealAmount">Сумма (RUB)</label>
      <input id="dealAmount" type="number" min="1" step="1" placeholder="100" />
      <label for="dealDescription">Описание</label>
      <textarea id="dealDescription" placeholder="Что нужно выполнить?"></textarea>
      <button id="createDealBtn" type="button">Создать эскроу-сделку</button>
    </section>

    <section class="panel" id="panel-balance">
      <h2>Пополнение</h2>
      <label for="topupAmount">Сумма (RUB)</label>
      <input id="topupAmount" type="number" min="1" step="1" placeholder="50" />
      <div class="row">
        <button id="topupStarsBtn" type="button">Пополнить через Stars</button>
        <button id="topupCryptoBtn" type="button" class="secondary">Пополнить через CryptoBot</button>
      </div>
      <label for="cryptoInvoiceId">ID счета CryptoBot (для проверки)</label>
      <input id="cryptoInvoiceId" type="text" placeholder="invoice id" />
      <button id="checkCryptoBtn" type="button">Проверить оплату CryptoBot</button>
    </section>

    <section class="panel" id="panel-reviews">
      <h2>Оставить отзыв</h2>
      <label for="reviewDealId">ID сделки</label>
      <input id="reviewDealId" type="number" min="1" step="1" placeholder="12" />
      <label for="reviewRating">Оценка (1-5)</label>
      <input id="reviewRating" type="number" min="1" max="5" step="1" placeholder="5" />
      <label for="reviewText">Текст</label>
      <textarea id="reviewText" placeholder="Опишите ваш опыт"></textarea>
      <button id="sendReviewBtn" type="button">Отправить отзыв</button>
    </section>

    <section class="panel" id="panel-withdraw">
      <h2>Вывод</h2>
      <label for="withdrawAmount">Сумма (RUB)</label>
      <input id="withdrawAmount" type="number" min="1" step="1" placeholder="70" />
      <label for="withdrawDestination">Реквизиты CryptoBot</label>
      <input id="withdrawDestination" type="text" placeholder="@cryptobot_or_wallet" />
      <button id="withdrawBtn" type="button">Создать заявку на вывод</button>
    </section>

    <p id="status" class="status"></p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
