<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deal Mini App</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
  </head>
  <body>
    <main class="card">
      <h1>Create Deal</h1>
      <p class="hint">
        Enter Telegram username. If this user started the bot, invitation will be
        sent.
      </p>

      <label for="username">Target username</label>
      <input id="username" type="text" placeholder="@username" maxlength="64" />

      <button id="createDealBtn" type="button">Send invitation</button>
      <p id="status" class="status"></p>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
